<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1e293b"/>
  
  <!-- Helmet base -->
  <path d="M16 28h32v20a8 8 0 01-8 8H24a8 8 0 01-8-8V28z" fill="#374151"/>
  
  <!-- Helmet top -->
  <path d="M16 28c0-8.837 7.163-16 16-16s16 7.163 16 16H16z" fill="#475569"/>
  
  <!-- Visor -->
  <rect x="18" y="30" width="28" height="12" rx="4" fill="#0f172a"/>
  
  <!-- Glowing eyes -->
  <rect x="20" y="32" width="8" height="8" rx="2" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="36" y="32" width="8" height="8" rx="2" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Mouth grill -->
  <rect x="26" y="46" width="12" height="4" rx="2" fill="#64748b"/>
  
  <!-- Antenna -->
  <circle cx="32" cy="10" r="3" fill="#22d3ee">
    <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <rect x="31" y="10" width="2" height="6" fill="#475569"/>
  
  <!-- Side vents -->
  <rect x="10" y="32" width="4" height="8" rx="1" fill="#475569"/>
  <rect x="50" y="32" width="4" height="8" rx="1" fill="#475569"/>
</svg>
